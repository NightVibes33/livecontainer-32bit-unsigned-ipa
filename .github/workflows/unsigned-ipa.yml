name: Build Unsigned IPA

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'apps.json'
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-unsigned-ipa:
    name: Build unsigned real-device IPA
    runs-on: macos-latest
    env:
      SCHEME: LiveContainer
      CONFIGURATION: Release
      DERIVED_DATA: build/DerivedData
      OUTPUT_IPA: LiveContainer-unsigned.ipa
    steps:
      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.2'

      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Checkout LiveExec32
        uses: actions/checkout@v6
        with:
          repository: LiveContainer/LiveExec32
          path: build/LiveExec32

      - name: Prepare Theos
        run: |
          set -eu
          brew install ldid
          git clone --recursive --depth 1 https://github.com/theos/theos.git "$RUNNER_TEMP/theos"

      - name: Build bundled LiveExec32
        env:
          THEOS: ${{ runner.temp }}/theos
        run: |
          set -euxo pipefail
          perl -0pi -e 's/(LiveExec32_CFLAGS = [^\n]*\n)/$1LiveExec32_CCFLAGS = -std=c++17\n/' build/LiveExec32/Makefile
          make -C build/LiveExec32 clean
          make -C build/LiveExec32
          LIVEEXEC_APP=$(find build/LiveExec32/.theos -type d -name 'LiveExec32.app' -print -quit)
          if [ -z "$LIVEEXEC_APP" ]; then
            echo "LiveExec32.app was not produced" >&2
            find build/LiveExec32/.theos -maxdepth 5 -print >&2 || true
            exit 1
          fi
          if [ -f build/LiveExec32/lib/libdynarmic.dylib ]; then
            cp build/LiveExec32/lib/libdynarmic.dylib "$LIVEEXEC_APP/"
            install_name_tool -id '@executable_path/libdynarmic.dylib' "$LIVEEXEC_APP/libdynarmic.dylib" || true
            install_name_tool -change libdynarmic.dylib '@executable_path/libdynarmic.dylib' "$LIVEEXEC_APP/LiveExec32" || true
            install_name_tool -change '@rpath/libdynarmic.dylib' '@executable_path/libdynarmic.dylib' "$LIVEEXEC_APP/LiveExec32" || true
          fi
          test -f "$LIVEEXEC_APP/Info.plist"
          test -f "$LIVEEXEC_APP/LiveExec32"
          echo "LIVEEXEC_APP=$LIVEEXEC_APP" >> "$GITHUB_ENV"

      - name: Set CI bundle build number
        run: |
          set -eu
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${GITHUB_RUN_NUMBER}" Resources/Info.plist
          /usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' Resources/Info.plist
          /usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' Resources/Info.plist

      - name: Build app without signing
        run: |
          set -o pipefail
          xcodebuild build \
            -project LiveContainer.xcodeproj \
            -scheme "$SCHEME" \
            -configuration "$CONFIGURATION" \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath "$DERIVED_DATA" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER=""

      - name: Package unsigned IPA
        run: |
          set -eu
          APP_PATH=$(find "$DERIVED_DATA/Build/Products/${CONFIGURATION}-iphoneos" -maxdepth 2 -type d -name 'LiveContainer.app' -print -quit)
          if [ -z "$APP_PATH" ]; then
            echo "LiveContainer.app was not produced" >&2
            find "$DERIVED_DATA/Build/Products" -maxdepth 4 -print >&2
            exit 1
          fi
          test -n "${LIVEEXEC_APP:-}"
          test -d "$LIVEEXEC_APP"
          rm -rf "$APP_PATH/LiveExec32.app"
          ditto "$LIVEEXEC_APP" "$APP_PATH/LiveExec32.app"
          test -f "$APP_PATH/LiveExec32.app/Info.plist"
          test -f "$APP_PATH/LiveExec32.app/LiveExec32"
          BUNDLE_ID=$(/usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' "$APP_PATH/Info.plist")
          make_entitlements() {
            python3 - "$1" "$2" "$3" <<'PY'
          import sys
          from pathlib import Path
          source_path, entitlements_path, bundle_id = sys.argv[1:4]
          text = Path(source_path).read_text()
          replacements = {
              '$(DEVELOPMENT_TEAM)': 'AAAAA11111',
              '$(PRODUCT_BUNDLE_IDENTIFIER)': bundle_id,
              '$(APP_GROUP_SIDESTORE)': 'group.com.SideStore.SideStore',
              '$(APP_GROUP_ALTSTORE)': 'group.com.rileytestut.AltStore',
              '$(AppIdentifierPrefix)': 'AAAAA11111.',
          }
          for key, value in replacements.items():
              text = text.replace(key, value)
          Path(entitlements_path).write_text(text)
          PY
          }
          MAIN_ENTITLEMENTS="$RUNNER_TEMP/LiveContainer-ad-hoc-entitlements.plist"
          LIVEPROCESS_ENTITLEMENTS="$RUNNER_TEMP/LiveProcess-ad-hoc-entitlements.plist"
          LAUNCH_ENTITLEMENTS="$RUNNER_TEMP/LaunchAppExtension-ad-hoc-entitlements.plist"
          LAUNCH_HELPER_ENTITLEMENTS="$RUNNER_TEMP/LaunchAppExtensionHelper-ad-hoc-entitlements.plist"
          make_entitlements entitlements.xml "$MAIN_ENTITLEMENTS" "$BUNDLE_ID"
          make_entitlements LiveProcess/LiveProcess.entitlements "$LIVEPROCESS_ENTITLEMENTS" "$BUNDLE_ID.LiveProcess"
          make_entitlements LaunchAppExtension/LaunchAppExtension.entitlements "$LAUNCH_ENTITLEMENTS" "$BUNDLE_ID.LaunchAppExtension"
          make_entitlements LaunchAppExtensionHelper/LaunchAppExtensionHelper.entitlements "$LAUNCH_HELPER_ENTITLEMENTS" "$BUNDLE_ID.LaunchAppExtensionHelper"
          find "$APP_PATH" -type f \( -name '*.dylib' -o -name '*.so' \) -print | while IFS= read -r binary; do
            codesign --force --sign - --timestamp=none "$binary"
          done
          if [ -d "$APP_PATH/Frameworks" ]; then
            find "$APP_PATH/Frameworks" -maxdepth 1 -type d -name '*.framework' -print | while IFS= read -r framework; do
              codesign --force --sign - --timestamp=none "$framework"
            done
          fi
          if [ -d "$APP_PATH/PlugIns" ]; then
            for appex in "$APP_PATH"/PlugIns/*.appex; do
              [ -d "$appex" ] || continue
              case "$(basename "$appex")" in
                LiveProcess.appex) appex_entitlements="$LIVEPROCESS_ENTITLEMENTS" ;;
                LaunchAppExtension.appex) appex_entitlements="$LAUNCH_ENTITLEMENTS" ;;
                LaunchAppExtensionHelper.appex) appex_entitlements="$LAUNCH_HELPER_ENTITLEMENTS" ;;
                *) appex_entitlements= ;;
              esac
              if [ -n "${appex_entitlements:-}" ]; then
                codesign --force --sign - --timestamp=none --entitlements "$appex_entitlements" "$appex"
              else
                codesign --force --sign - --timestamp=none "$appex"
              fi
            done
          fi
          codesign --force --sign - --timestamp=none "$APP_PATH/LiveExec32.app"
          codesign --force --sign - --timestamp=none --entitlements "$MAIN_ENTITLEMENTS" "$APP_PATH"
          tools/package-unsigned-ipa.sh "$APP_PATH" "$OUTPUT_IPA"

      - name: Verify unsigned IPA
        run: |
          set -eu
          test -f "$OUTPUT_IPA"
          unzip -q "$OUTPUT_IPA" -d ipa-check
          test -d ipa-check/Payload/LiveContainer.app
          test -f ipa-check/Payload/LiveContainer.app/Info.plist
          test -d ipa-check/Payload/LiveContainer.app/LiveExec32.app
          test -f ipa-check/Payload/LiveContainer.app/LiveExec32.app/Info.plist
          test -f ipa-check/Payload/LiveContainer.app/LiveExec32.app/LiveExec32
          test -d ipa-check/Payload/LiveContainer.app/_CodeSignature
          test ! -e ipa-check/Payload/LiveContainer.app/embedded.mobileprovision
          codesign -d --entitlements :- ipa-check/Payload/LiveContainer.app > ipa-check-entitlements.plist
          grep -q 'group.com.SideStore.SideStore' ipa-check-entitlements.plist
          grep -q 'group.com.rileytestut.AltStore' ipa-check-entitlements.plist
          /usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' ipa-check/Payload/LiveContainer.app/Info.plist
          /usr/libexec/PlistBuddy -c 'Print :CFBundleExecutable' ipa-check/Payload/LiveContainer.app/Info.plist
          /usr/libexec/PlistBuddy -c 'Print :CFBundleVersion' ipa-check/Payload/LiveContainer.app/Info.plist

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: LiveContainer-unsigned-ipa
          path: ${{ env.OUTPUT_IPA }}
          if-no-files-found: error

      - name: Publish latest unsigned IPA release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -eu
          gh release delete unsigned-latest --cleanup-tag --yes || true
          gh release create unsigned-latest "$OUTPUT_IPA" \
            --target "$GITHUB_SHA" \
            --title "Latest unsigned IPA" \
            --notes "Unsigned real-device IPA built from $GITHUB_SHA for SideStore/AltStore import. Includes bundled LiveExec32.app." \
            --latest

      - name: Update AltStore source
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          IPA_PATH: ${{ env.OUTPUT_IPA }}
          IPA_DOWNLOAD_URL: https://github.com/${{ github.repository }}/releases/download/unsigned-latest/${{ env.OUTPUT_IPA }}
          RELEASE_URL: https://github.com/${{ github.repository }}/releases/tag/unsigned-latest
          RELEASE_TAG: unsigned-latest
        run: |
          set -eu
          python3 .github/update_unsigned_source.py
          python3 -m json.tool apps.json >/dev/null
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet -- apps.json; then
            git add apps.json
            git commit -m "Update AltStore source [skip ci]"
            git push
          else
            echo "apps.json unchanged"
          fi
